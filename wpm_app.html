<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPM Measurement Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">WPM Mastery Tool</h1>
            <p class="text-blue-100 text-sm mt-1">あなたの英語スピードを可視化しましょう</p>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-slate-200">
            <button id="tab-reading" class="flex-1 py-3 font-semibold text-blue-600 border-b-2 border-blue-600 bg-blue-50">
                📖 リーディング計測
            </button>
            <button id="tab-speaking" class="flex-1 py-3 font-semibold text-slate-500 hover:bg-slate-50 transition">
                🎙️ スピーキング計測
            </button>
        </div>

        <div class="p-6">
            <!-- READING SECTION -->
            <div id="section-reading">
                <label class="block text-sm font-medium text-slate-700 mb-2">英文を貼り付けてください:</label>
                <textarea id="reading-text" class="w-full h-40 p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-800" placeholder="Paste your English text here..."></textarea>
                
                <div class="mt-4 flex flex-wrap gap-4 items-center justify-between">
                    <div class="flex gap-2">
                        <button id="btn-start-reading" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold transition">スタート</button>
                        <button id="btn-stop-reading" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-bold transition hidden">ストップ</button>
                        <button id="btn-reset-reading" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-2 rounded-lg font-bold transition">リセット</button>
                    </div>
                    <div class="text-right">
                        <span class="text-slate-500 text-sm">単語数:</span>
                        <span id="read-word-count" class="text-xl font-bold text-slate-800">0</span>
                    </div>
                </div>
            </div>

            <!-- SPEAKING SECTION (Hidden by default) -->
            <div id="section-speaking" class="hidden">
                <div class="bg-slate-100 p-4 rounded-xl border-2 border-dashed border-slate-300 min-h-[160px] mb-4">
                    <p id="speech-status" class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">音声認識停止中</p>
                    <div id="speech-result" class="text-slate-800 leading-relaxed italic">
                        マイクボタンを押して、英語を話してください。リアルタイムで文字起こしされます。
                    </div>
                </div>

                <div class="flex flex-wrap gap-4 items-center justify-between">
                    <button id="btn-toggle-speech" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold transition glow">
                        <span id="mic-icon">🎤</span> <span id="mic-text">マイクを開始</span>
                    </button>
                    <div class="text-right">
                        <span class="text-slate-500 text-sm">話した単語数:</span>
                        <span id="speak-word-count" class="text-xl font-bold text-slate-800">0</span>
                    </div>
                </div>
                <p class="text-[10px] text-slate-400 mt-4 text-center">※ブラウザの音声認識機能を使用します（Chrome推奨）</p>
            </div>

            <!-- RESULTS (Shared) -->
            <div id="results" class="mt-8 pt-6 border-t border-slate-100 flex justify-around">
                <div class="text-center">
                    <p class="text-slate-500 text-xs uppercase font-bold tracking-widest">経過時間</p>
                    <p id="timer" class="text-3xl font-mono font-bold text-slate-800">00:00.0</p>
                </div>
                <div class="text-center">
                    <p class="text-slate-500 text-xs uppercase font-bold tracking-widest">現在のWPM</p>
                    <p id="wpm-display" class="text-4xl font-bold text-blue-600">0</p>
                </div>
            </div>
            
            <div id="wpm-target" class="mt-4 p-3 bg-blue-50 rounded-lg text-center hidden">
                <p class="text-blue-700 text-sm font-semibold" id="wpm-feedback">ネイティブスピード（150-200）を目指そう！</p>
            </div>
        </div>
    </div>

    <script>
        // State
        let timerInterval;
        let startTime;
        let currentWords = 0;
        let isRunning = false;
        let mode = 'reading'; // 'reading' or 'speaking'

        // DOM Elements
        const timerDisplay = document.getElementById('timer');
        const wpmDisplay = document.getElementById('wpm-display');
        const wpmFeedback = document.getElementById('wpm-feedback');
        const wpmTargetBox = document.getElementById('wpm-target');

        // Reading Elements
        const readingArea = document.getElementById('reading-text');
        const readWordCountDisp = document.getElementById('read-word-count');
        const btnStartRead = document.getElementById('btn-start-reading');
        const btnStopRead = document.getElementById('btn-stop-reading');
        const btnResetRead = document.getElementById('btn-reset-reading');

        // Speaking Elements
        const speechResult = document.getElementById('speech-result');
        const speechStatus = document.getElementById('speech-status');
        const btnToggleSpeech = document.getElementById('btn-toggle-speech');
        const micText = document.getElementById('mic-text');
        const speakWordCountDisp = document.getElementById('speak-word-count');

        // Tabs
        const tabReading = document.getElementById('tab-reading');
        const tabSpeaking = document.getElementById('tab-speaking');
        const secReading = document.getElementById('section-reading');
        const secSpeaking = document.getElementById('section-speaking');

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = 0; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                speechResult.innerText = transcript;
                updateWordCount(transcript, 'speaking');
            };

            recognition.onerror = (e) => {
                console.error(e);
                stopSpeaking();
            };
        }

        // Functions
        function countWords(str) {
            return str.trim().split(/\s+/).filter(word => word.length > 0).length;
        }

        function updateTimer() {
            const now = Date.now();
            const diff = (now - startTime) / 1000;
            const minutes = Math.floor(diff / 60);
            const seconds = (diff % 60).toFixed(1);
            timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.padStart(4, '0')}`;
            
            if (diff > 0.5) {
                const wpm = Math.round((currentWords / diff) * 60);
                wpmDisplay.innerText = wpm;
                updateFeedback(wpm);
            }
        }

        function updateFeedback(wpm) {
            wpmTargetBox.classList.remove('hidden');
            if (wpm < 100) {
                wpmFeedback.innerText = "まずはWPM 100を目指しましょう！";
            } else if (wpm < 150) {
                wpmFeedback.innerText = "いいペースです！あと少しでネイティブ並み！";
            } else if (wpm < 200) {
                wpmFeedback.innerText = "素晴らしい！ネイティブスピードです！";
            } else {
                wpmFeedback.innerText = "驚異的なスピードです！";
            }
        }

        function updateWordCount(text, currentMode) {
            currentWords = countWords(text);
            if (currentMode === 'reading') {
                readWordCountDisp.innerText = currentWords;
            } else {
                speakWordCountDisp.innerText = currentWords;
            }
        }

        // Reading Logic
        btnStartRead.onclick = () => {
            const text = readingArea.value;
            if (!text) return alert("英文を入力してください");
            
            updateWordCount(text, 'reading');
            isRunning = true;
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 100);
            
            btnStartRead.classList.add('hidden');
            btnStopRead.classList.remove('hidden');
            readingArea.readOnly = true;
        };

        btnStopRead.onclick = () => {
            clearInterval(timerInterval);
            isRunning = false;
            btnStopRead.classList.add('hidden');
            btnStartRead.classList.remove('hidden');
            btnStartRead.innerText = "再開";
        };

        btnResetRead.onclick = () => {
            clearInterval(timerInterval);
            isRunning = false;
            currentWords = 0;
            timerDisplay.innerText = "00:00.0";
            wpmDisplay.innerText = "0";
            readWordCountDisp.innerText = "0";
            readingArea.value = "";
            readingArea.readOnly = false;
            btnStartRead.classList.remove('hidden');
            btnStopRead.classList.add('hidden');
            btnStartRead.innerText = "スタート";
            wpmTargetBox.classList.add('hidden');
        };

        // Speaking Logic
        function startSpeaking() {
            if (!recognition) return alert("お使いのブラウザは音声認識に対応していません。Chromeをお試しください。");
            
            speechResult.innerText = "";
            speakWordCountDisp.innerText = "0";
            currentWords = 0;
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 100);
            
            recognition.start();
            isRunning = true;
            speechStatus.innerText = "🔴 録音中...";
            speechStatus.classList.replace('text-slate-400', 'text-red-500');
            micText.innerText = "計測を停止";
            btnToggleSpeech.classList.replace('bg-blue-600', 'bg-red-600');
        }

        function stopSpeaking() {
            recognition.stop();
            clearInterval(timerInterval);
            isRunning = false;
            speechStatus.innerText = "✅ 計測完了";
            speechStatus.classList.replace('text-red-500', 'text-green-600');
            micText.innerText = "マイクを開始";
            btnToggleSpeech.classList.replace('bg-red-600', 'bg-blue-600');
        }

        btnToggleSpeech.onclick = () => {
            if (!isRunning) startSpeaking();
            else stopSpeaking();
        };

        // Tabs Logic
        tabReading.onclick = () => {
            mode = 'reading';
            secReading.classList.remove('hidden');
            secSpeaking.classList.add('hidden');
            tabReading.className = "flex-1 py-3 font-semibold text-blue-600 border-b-2 border-blue-600 bg-blue-50";
            tabSpeaking.className = "flex-1 py-3 font-semibold text-slate-500 hover:bg-slate-50 transition";
            resetAll();
        };

        tabSpeaking.onclick = () => {
            mode = 'speaking';
            secSpeaking.classList.remove('hidden');
            secReading.classList.add('hidden');
            tabSpeaking.className = "flex-1 py-3 font-semibold text-blue-600 border-b-2 border-blue-600 bg-blue-50";
            tabReading.className = "flex-1 py-3 font-semibold text-slate-500 hover:bg-slate-50 transition";
            resetAll();
        };

        function resetAll() {
            clearInterval(timerInterval);
            isRunning = false;
            timerDisplay.innerText = "00:00.0";
            wpmDisplay.innerText = "0";
            wpmTargetBox.classList.add('hidden');
            if (recognition) recognition.stop();
        }

    </script>
</body>
</html>
